[package]
name = "base60"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
description = "View binary data as Sumero-Babylonian base-60 digit pairs."
license = "MIT OR Apache-2.0"
repository = "https://github.com/retengart/test-60"
keywords = ["hexdump", "sexagesimal", "base60", "binary", "viewer"]
categories = ["command-line-utilities", "visualization"]
publish = false

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive"] }
crossterm = "0.29.0"
memmap2 = "0.9.10"
ratatui = "0.30.0"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"

[lints.rust]
unsafe_op_in_unsafe_fn = "warn"
missing_debug_implementations = "warn"
unreachable_pub = "warn"
rust_2018_idioms = { level = "warn", priority = -1 }
unused_lifetimes = "warn"
unused_qualifications = "warn"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
cargo = { level = "warn", priority = -1 }
# Transitive dependency graph is fixed by upstream; warning is not actionable.
multiple_crate_versions = "allow"
# Intentional: module-per-concern layout is clearer than a monolithic file.
module_name_repetitions = "allow"
# This is a binary crate, so `pub(crate)` is semantically accurate and
# consistent with `unreachable_pub` — the two nursery lints disagree and we
# side with the stronger signal.
redundant_pub_crate = "allow"
