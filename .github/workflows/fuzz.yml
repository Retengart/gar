name: Fuzz

on:
  schedule:
    - cron: "37 4 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: cargo-fuzz

      - name: Fuzz parse_run
        run: cargo +nightly fuzz run parse_run -- -max_total_time=240

      - name: Fuzz pattern_from_str
        run: cargo +nightly fuzz run pattern_from_str -- -max_total_time=240

      - name: Upload fuzz artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
          if-no-files-found: ignore
